<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>陈大宝语音助手</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; background: linear-gradient(160deg, #ffe0ec 0%, #ffc2d4 50%, #ffb3c6 100%); }
  .content { width: 100%; max-width: 600px; display: flex; flex-direction: column; align-items: center; }
  h1 { font-size: 2em; color: #c0395a; text-shadow: 0 2px 8px rgba(255,105,135,0.2); margin-bottom: 16px; letter-spacing: 2px; }
  .avatar { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 4px solid white; box-shadow: 0 4px 20px rgba(255,105,135,0.3); margin-bottom: 16px; }
  #btn { width: 110px; height: 110px; border-radius: 50%; font-size: 2.2em; border: none; cursor: pointer; background: linear-gradient(135deg, #ff85a1, #ff5c8a); color: white; box-shadow: 0 4px 20px rgba(255,92,138,0.4); transition: all 0.2s; }
  #btn.recording { background: linear-gradient(135deg, #ff5c8a, #c0392b); transform: scale(1.1); box-shadow: 0 4px 30px rgba(255,92,138,0.6); }
  #btn:disabled { opacity: 0.6; cursor: not-allowed; }
  #status { margin: 14px 0; color: #c0395a; font-size: 1em; font-weight: 700; }
  #chat { width: 100%; margin-top: 16px; display: flex; flex-direction: column; gap: 10px; }
  .bubble-wrap { display: flex; flex-direction: column; }
  .bubble-wrap.user { align-items: flex-end; }
  .bubble-wrap.bot { align-items: flex-start; }
  .label { font-size: 0.75em; color: #c0395a; margin-bottom: 3px; font-weight: 700; }
  .bubble { padding: 12px 18px; border-radius: 20px; max-width: 80%; line-height: 1.6; font-size: 1em; }
  .user .bubble { background: linear-gradient(135deg, #ff85a1, #ff5c8a); color: white; border-bottom-right-radius: 4px; }
  .bot .bubble { background: white; color: #d63670; border-bottom-left-radius: 4px; box-shadow: 0 2px 10px rgba(255,92,138,0.15); }
  .audio-btn { margin-top: 6px; background: #ffb3c6; border: none; border-radius: 20px; padding: 4px 12px; font-size: 0.8em; color: #c0395a; cursor: pointer; font-family: 'Nunito', sans-serif; font-weight: 700; }
  .audio-btn:hover { background: #ff85a1; color: white; }
</style>
</head>

  <h1>🌸 陈大宝</h1>
  <button id="btn" onclick="toggle()">🎤</button>
  <div id="status">按下按钮开始说话</div>
  <div id="chat"></div>
</div>
<script>
let mediaRecorder, chunks = [], recording = false;
async function toggle() {
  if (!recording) {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    chunks = [];
    mediaRecorder.ondataavailable = e => chunks.push(e.data);
    mediaRecorder.onstop = sendAudio;
    mediaRecorder.start();
    recording = true;
    document.getElementById("btn").className = "recording";
    document.getElementById("btn").textContent = "⏹️";
    document.getElementById("status").textContent = "录音中...再按一次停止";
  } else {
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(t => t.stop());
    recording = false;
    document.getElementById("btn").className = "";
    document.getElementById("btn").textContent = "⏳";
    document.getElementById("btn").disabled = true;
    document.getElementById("status").textContent = "陈大宝思考中...";
  }
}
async function sendAudio() {
  const blob = new Blob(chunks, { type: "audio/webm" });
  const form = new FormData();
  form.append("audio", blob, "audio.webm");
  const res = await fetch("/chat", { method: "POST", body: form });
  const data = await res.json();
  addBubble("你", data.user_text, "user", null);
  addBubble("陈大宝", data.reply, "bot", data.audio_url);
  new Audio(data.audio_url).play();
  document.getElementById("btn").textContent = "🎤";
  document.getElementById("btn").disabled = false;
  document.getElementById("status").textContent = "按下按钮开始说话";
}
function addBubble(label, text, who, audioUrl) {
  const wrap = document.createElement("div");
  wrap.className = "bubble-wrap " + who;
  let extra = "";
  if (audioUrl) {
    extra = "<button class='audio-btn' onclick=\"new Audio('" + audioUrl + "').play()\">🔊 重新播放</button>";
  }
  wrap.innerHTML = "<div class='label'>" + label + "</div><div class='bubble'>" + text + "</div>" + extra;
  document.getElementById("chat").appendChild(wrap);
  wrap.scrollIntoView({ behavior: "smooth" });
}
</script>
